name:  Base62 CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:

    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: Build
        run: make

      - name: Fuzz (smoke)
        run: |
          go test -run='^$' -fuzz='FuzzRoundTrip' -fuzztime=20s .
          go test -run='^$' -fuzz='FuzzDecode$' -fuzztime=20s .
